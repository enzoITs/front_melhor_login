<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Septem Racing</title>
    <link rel="stylesheet" href="../style/style.css">
</head>

<body>
    <header>
        <nav>
            <h1 class="septem">SEPTEM RACING</h1>
            <ul class="h-list">
                <li><a href="dashboard.html"><span>Dashboard</span></a></li>
                <li><a href="carros.html">Cars</a></li>
                <li><a href="corrida.html">Racings</a></li>
                <li><a href="time.html">Teams</a></li>
            </ul>
        </nav>

        <section class="h-footer">
            <ul class="f-list">
                <li><a href="#">About</a></li>
                <li><a href="#">Logout</a></li>
            </ul>
        </section>
    </header>

    <main class="register-container">
        <div class="register-card">
            <h2>Criar Conta</h2>
            <p>Entre no grid da <span>Septem Racing</span></p>

            <form id="register-form">
                <div class="input-group">
                    <label for="nome">Nome</label>
                    <input id="nome" name="nome" type="text" placeholder="Seu nome" required>
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" placeholder="seu@email.com" required>
                </div>

                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input id="senha" name="senha" type="password" placeholder="********" required>
                </div>

                <div class="input-group">
                    <label for="confirm-senha">Confirmar Senha</label>
                    <input id="confirm-senha" name="confirmSenha" type="password" placeholder="********" required>
                </div>

                <button type="submit">Cadastrar</button>
            </form>

            <p class="login-link">
                Já tem conta? <a href="#">Entrar</a>
            </p>
        </div>
    </main>

    <footer>
        <nav>
            <h1 class="footer"><span>MORE</span></h1>
            <ul>
                <li class="li-footer"><a href="login.html">LOGAR</a></li>
                <li class="li-footer"><a href="#">CADASTRAR</a></li>
                <li class="li-footer"><a href="faq.html">FAQ</a></li>
            </ul>
            <div class="config"></div>
        </nav>
    </footer>

    <script>
        const form = document.getElementById('register-form');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const nome = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;
            const confirmSenha = document.getElementById('confirm-senha').value;

            if (!nome || !email || !senha) {
                return alert('Preencha todos os campos');
            }

            if (senha !== confirmSenha) {
                return alert('As senhas não coincidem');
            }

            const data = { nome, email, senha };

            try {
                // API expects POST /users with body { nome, email, senha }
                const response = await fetch('http://localhost:3000/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    alert('Conta criada com sucesso!');
                    form.reset();
                } else {
                    alert(result.error || result.message || 'Erro ao criar conta');
                }

            } catch (error) {
                console.error(error);
                alert('Erro ao conectar com o servidor');
            }
        });
    </script>
</body>

</html>
